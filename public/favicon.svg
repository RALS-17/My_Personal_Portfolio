<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0d1117" rx="16"/>
  
  <!-- Gradient border -->
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#79c0ff;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" rx="16"/>
  
  <!-- Code bracket and text -->
  <text x="50" y="62" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">
    <tspan opacity="0.5" font-size="26">&lt;</tspan><tspan>RA</tspan><tspan opacity="0.5" font-size="26">/&gt;</tspan>
  </text>
</svg>